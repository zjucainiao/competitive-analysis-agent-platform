services:
  postgres:
    image: postgres:16-alpine
    container_name: cap-postgres
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: cap-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Jaeger all-in-one：UI + OTLP collector + 内存存储一进程齐活。
  # 验收：跑完 e2e 打开 http://localhost:16686 能看到 service=competitive-analysis-agent
  # 的 trace tree（agent.<name> → llm.chat 子 span）。
  jaeger:
    image: jaegertracing/all-in-one:1.59
    container_name: cap-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP（我们默认走这条）

volumes:
  postgres_data:
  redis_data:
