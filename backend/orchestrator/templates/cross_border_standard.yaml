template_id: cross_border_standard_v1
name: 跨境电商 SaaS 标准 DAG
industry: cross_border_ecommerce_saas
description: |
  跨境电商建站 / 履约平台：1 个 target_product + N 个 competitors，并行采集 + 抽取 →
  Analyst 多维度对比 → Reporter → QA → END。
  反馈环 max_rounds=3。

variables:
  products: project.target_plus_competitors
  collect_dimensions:
    - homepage
    - features
    - pricing
    - help_docs
    - user_reviews
  product_urls:
    Shopify: https://www.shopify.com
    BigCommerce: https://www.bigcommerce.com
    WooCommerce: https://woocommerce.com
    Wix: https://www.wix.com/ecommerce
    Squarespace: https://www.squarespace.com
    SHOPLAZZA: https://www.shoplazza.com
    Shoplazza: https://www.shoplazza.com

nodes:
  - id: start
    type: start

  - id: collect.{product}
    type: agent_call
    agent: collector
    for_each: products
    depends_on: [start]
    # 300s / 240s / 180s 是「节点超时连锁失败」事故后精调的下限
    # （backend/orchestrator/plan_directives.py NODE_TIMEOUT_FLOOR_MS）；
    # native 引擎消费 plan 超时后，模板值不得低于该表，否则直接回归旧的过小超时。
    timeout_ms: 300000
    max_retries: 2

  - id: extract.{product}
    type: agent_call
    agent: extractor
    for_each: products
    depends_on:
      - "collect.{product}"
    timeout_ms: 600000
    max_retries: 1

  - id: join_extract
    type: parallel_join
    depends_on: [extract.*]

  - id: analyst
    type: agent_call
    agent: analyst
    depends_on: [join_extract]
    timeout_ms: 240000
    max_retries: 2

  - id: reporter
    type: agent_call
    agent: reporter
    depends_on: [analyst]
    timeout_ms: 300000
    max_retries: 2

  - id: qa
    type: agent_call
    agent: qa
    depends_on: [reporter]
    timeout_ms: 180000
    max_retries: 2

  - id: end
    type: end
    depends_on: [qa]
