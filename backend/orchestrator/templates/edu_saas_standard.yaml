template_id: edu_saas_standard_v1
name: 教育 SaaS 标准 DAG
industry: edu_saas
description: |
  在线教育平台（K12 / 高教 / 企业培训）：1 个 target + N 个竞品，并行采集 + 抽取 →
  Analyst 多维度对比 → Reporter → QA → END。
  反馈环 max_rounds=3。

variables:
  products: project.target_plus_competitors
  collect_dimensions:
    - homepage
    - features
    - pricing
    - help_docs
    - user_reviews
  product_urls:
    Coursera: https://www.coursera.org
    Udemy: https://www.udemy.com
    edX: https://www.edx.org
    Khan Academy: https://www.khanacademy.org
    Canvas: https://www.instructure.com/canvas
    Blackboard: https://www.blackboard.com
    Google Classroom: https://classroom.google.com
    钉钉教育: https://edu.dingtalk.com

nodes:
  - id: start
    type: start

  - id: collect.{product}
    type: agent_call
    agent: collector
    for_each: products
    depends_on: [start]
    timeout_ms: 180000
    max_retries: 2

  - id: extract.{product}
    type: agent_call
    agent: extractor
    for_each: products
    depends_on:
      - "collect.{product}"
    timeout_ms: 600000
    max_retries: 1

  - id: join_extract
    type: parallel_join
    depends_on: [extract.*]

  - id: analyst
    type: agent_call
    agent: analyst
    depends_on: [join_extract]
    timeout_ms: 120000
    max_retries: 2

  - id: reporter
    type: agent_call
    agent: reporter
    depends_on: [analyst]
    timeout_ms: 300000
    max_retries: 2

  - id: qa
    type: agent_call
    agent: qa
    depends_on: [reporter]
    timeout_ms: 60000
    max_retries: 2

  - id: end
    type: end
    depends_on: [qa]
